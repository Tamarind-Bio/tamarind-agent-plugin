name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # PR #1 requires the CLI 0.2 contract from tamarind-cli#16. Pin the exact
      # reviewed commit until 0.2.0 is published, then replace this with the
      # released `tamarind-cli>=0.2,<0.3` range before production deployment.
      - name: Install the paired CLI 0.2 contract
        run: >-
          python -m pip install
          'tamarind-cli @ git+https://github.com/Tamarind-Bio/tamarind-cli@a10f9580a0e59d3736870790070351c72c42480d'
          pytest PyYAML
      - name: Run plugin and CLI contract tests
        run: python -m pytest --strict-markers
      - name: Verify installed dependency consistency
        run: python -m pip check
      - name: Compile retained helpers
        run: python -m compileall -q plugins/tamarind/skills
      - name: Run every retained helper from an unrelated directory
        shell: bash
        run: |
          repo="$PWD"
          workdir="$(mktemp -d)"
          cd "$workdir"
          while IFS= read -r script; do
            python "$script" --help >/dev/null
          done < <(find "$repo/plugins/tamarind/skills" -path '*/scripts/*.py' ! -name '_common.py' -type f | sort)
